(function() {
  const DATA = {"nodes":[{"id":"#civil--supreme-court-challenge","type":"crisis","rawType":"crisis","cluster":"civil","entities":["civil-liberties","isia-enforcement","isia-political"],"topics":["#surveillance","#legal-challenge","#public-opinion"],"situation":"The American Civil Liberties Union brings a landmark case to the Supreme Court arguing that ISIA chip-tracking firmware on consumer devices violates the Fourth Amendment. They have strong precedent — the case is legally serious, not frivolous. Two former ISIA attorneys filed amicus briefs supporting the challenge. If the court rules against the agency, the entire consumer-hardware monitoring program collapses in the US. If the agency fights and wins, it validates the surveillance — but the liberty cluster grows by 8 points in polling and three European courts announce similar reviews. The deeper problem: the court challenge is legitimate. The agency IS conducting mass surveillance. The legal question is whether existential risk justifies it. The judge doesn't understand ASI risk and has no framework to evaluate it.","bars":"pol ↓ if fought aggressively, int ↓ if program narrowed","barCount":2,"refs":["#mon--surveillance-expand","#7"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--deepfake-isia-director","type":"crisis","rawType":"crisis","cluster":"journalist","entities":["journalist","isia-comms","public-cluster-skeptic"],"topics":["#narrative","#public-opinion","#ai-diffusion"],"situation":"A deepfake video of the DG surfaces on social media — convincing footage of the player character saying \"I know ASI isn't real but we need the funding.\" Tens of millions of views before takedown. The agency's AI detection tools confirm it's synthetic, but the damage is done: skeptic cluster sees it as confirmation, fear cluster worries the agency's been lying, indifferent cluster now pays attention for the wrong reasons. The meta-problem: this is a non-ASI AI harm (E-53) that directly undermines the agency tasked with preventing ASI. The very technology the pause allows (sub-threshold AI) is being used to destroy the political support the pause depends on. And the agency can't easily prove anything anymore — if AI can fabricate video of the DG, it can fabricate anything, including the agency's evidence of threats.","bars":"pol ↓↓ (trust damaged regardless of response)","barCount":1,"refs":["#pol--success-narrative","#pol--corp-lobbying"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--labor-union-split","type":"crisis","rawType":"crisis","cluster":"public","entities":["public-cluster-econ","isia-political","corp-lobby"],"topics":["#economic-pressure","#public-opinion","#lobbying","#protest"],"situation":"The International Federation of Metalworkers (28M members across treaty nations) is fracturing over the pause. The manufacturing wing wants the pause lifted — AI automation restrictions cost them bargaining leverage because non-treaty nations automate freely. The logistics wing wants the pause strengthened — autonomous systems already eliminated 4M of their jobs using sub-threshold AI, and they want tighter restrictions. Both wings are organizing politically, but in opposite directions. The agency faces a union movement that simultaneously demands MORE and LESS regulation. Both sides have legitimate grievances. The manufacturing wing is being courted by corporate lobbyists (\"we're on the same side — lift the pause\"). The logistics wing is being courted by fear-cluster activists (\"AI is destroying your lives\"). Neither side understands ASI risk — they're fighting about jobs.","bars":"pol ↓ either way (lose support from one constituency)","barCount":1,"refs":["#pol--unemployment-crisis","#pol--election-year"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--megachurch-sermon","type":"consequence","rawType":"consequence","cluster":"public","entities":["public-cluster-fear","public-cluster-skeptic","isia-comms"],"topics":["#public-opinion","#narrative"],"situation":"Pastor Elijah Morrow of a 40,000-member megachurch in Houston delivers a viral sermon: \"Building a mind greater than God's is the sin of Babel.\" The sermon gets 90M views. Within weeks, evangelical organizations across the US, Brazil, and Nigeria adopt anti-ASI positions — but framed entirely in religious terms. \"AI is hubris.\" \"Only God creates intelligence.\" This is a massive opinion-cluster event: millions of people who were in the indifferent cluster (E-29: \"AI is not a topic I think about\") suddenly become strong pause supporters — but for theological reasons, not risk-assessment reasons. They support the pause but oppose the agency's scientific mission (safety research, cognitive enhancement, uploading). They want the pause to be permanent — not a bridge to safe ASI, but a moral prohibition. The agency's comms team sees opportunity and danger simultaneously. These new allies could triple political support for the pause. But they'd also block safety research and demand the agency justify itself in religious rather than scientific terms.","bars":"pol ↑↑ if embraced (massive new coalition), saf ↓ if embraced (research constrained by religious allies)","barCount":2,"refs":["#era--generational-shift","#research--biotech-proposal"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--ai-winter-narrative","type":"report","rawType":"report","cluster":"public","entities":["public-cluster-skeptic","journalist","isia-comms"],"topics":["#narrative","#public-opinion","#success-trap"],"situation":"A best-selling book by a former Stanford CS professor — \"The Great Overreaction: How AI Hysteria Cost the World a Decade\" — argues that ASI was always physically impossible and the pause was an expensive hoax driven by paranoid effective altruists and power-hungry bureaucrats. The book is well-written, persuasive to non-technical readers, and factually wrong in ways that require deep technical knowledge to rebut. The book is burning through the skeptic and indifferent clusters. Six talk-show appearances this month. A documentary in pre-production. The author isn't malicious — they're a legitimate computer scientist who genuinely believes ASI is impossible. They have credentials the agency's spokespeople lack. The agency's chief scientist can rebut the technical arguments, but only in ways the audience won't understand. Polling shift: \"ASI threat was exaggerated\" up 11 points in key demographics since publication.","bars":"pol ↓ (political landscape shifts against agency)","barCount":1,"refs":["#pol--success-trap","#pol--success-narrative"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--celebrity-endorsement-backfire","type":"consequence","rawType":"consequence","cluster":"public","entities":["public-cluster-indiff","public-cluster-liberty","isia-comms"],"topics":["#public-opinion","#narrative"],"situation":"A globally popular musician (300M social followers) makes the pause their personal cause — announces a \"Pause World Tour,\" donates $50M to pro-pause advocacy, and records a music video depicting ASI apocalypse. The indifferent cluster is suddenly paying attention. Support for the pause jumps 9 points overnight. Three weeks later, the musician is arrested for tax evasion and domestic violence. The press narrative pivots instantly: \"the celebrity who supported the AI pause is a fraud.\" Anti-pause commentators connect the two: \"the same people who believed the ASI hoax believed this celebrity was a saint.\" The skeptic cluster uses it as proof that pause supporters are gullible. Support drops 14 points — 5 points BELOW where it started. The agency had no involvement with the celebrity. It neither sought nor endorsed the support. But in the public mind, the association is permanent.","bars":"pol ↓ (net negative after the scandal, despite the initial boost)","barCount":1,"refs":["#pol--success-narrative","#pol--election-year"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--protest-to-legislator-pipeline","type":"crisis","rawType":"crisis","cluster":"public","entities":["public-cluster-liberty","public-cluster-econ","gov-treaty-major"],"topics":["#protest","#public-opinion","#budget","#election"],"situation":"Street protests against ISIA surveillance in Berlin, London, and Washington have been growing for months — mostly the liberty cluster, some econ cluster joining. Now the protests have crossed a threshold: three parliamentary caucuses in Europe and a bipartisan group in the US Senate have introduced coordinated legislation to strip the agency of domestic surveillance authority. The bills have real support — 40%+ approval in polls. Media framing: \"the people vs. the surveillance state.\" This is the mechanism E-50 describes: opinion cluster → protest → media → legislator → vote. The agency is watching its mandate get dismantled through legitimate democratic processes. The surveillance powers being challenged are genuinely important for enforcement. The people challenging them have genuinely legitimate civil liberties concerns. Democracy is functioning correctly — and it might kill everyone.","bars":"int ↓ if surveillance stripped, pol ↓ if fought aggressively","barCount":2,"refs":["#civil--supreme-court-challenge","#mon--surveillance-expand"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--autonomous-vehicle-massacre","type":"crisis","rawType":"crisis","cluster":"public","entities":["public-cluster-fear","public-cluster-skeptic","isia-comms","journalist"],"topics":["#public-opinion","#narrative","#ai-diffusion"],"situation":"An autonomous vehicle fleet in Seoul malfunctions catastrophically — 23 dead, 140 injured over 45 minutes before manual override is achieved. The AI system was operating well within treaty limits. Investigation shows a conventional software bug, not an AI capability issue. But the public doesn't parse this distinction. Three contradictory opinion-cluster reactions happen simultaneously: 1. Fear cluster: \"AI IS dangerous — strengthen the pause, ban autonomous vehicles too!\" 2. Skeptic cluster: \"The pause didn't prevent this, so what's the point? 23 people died DESPITE ISIA oversight.\" 3. Econ cluster: \"If the pause can't even keep cars safe, it's all theater.\" All three reactions are based on the same incorrect inference: that this non-ASI incident says something about ASI risk. It doesn't. But explaining that requires technical distinctions most people can't make and most journalists won't communicate accurately. The fear cluster's reaction is politically useful but factually wrong. The skeptic cluster's reaction is politically dangerous but logically understandable.","bars":"pol ↑ if fear exploited (temporarily), pol ↓ if corrected (lose the moment)","barCount":1,"refs":["#pol--protest-that-helps","#pol--unemployment-crisis"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--academic-freedom-revolt","type":"crisis","rawType":"crisis","cluster":"researcher","entities":["researcher-safety","researcher-capability","civil-liberties","isia-research-ctrl"],"topics":["#research-approval","#publication","#public-opinion","#narrative"],"situation":"1,200 university researchers across 40 countries sign an open letter: \"The Right to Think: Against the Criminalization of Knowledge.\" They argue ISIA research restrictions violate academic freedom, that classification of safety research is counterproductive, and that the review process delays critical work by 6-18 months. Signatories include three Nobel laureates and the heads of six national science academies. The letter is legally and ethically serious — academic freedom IS a fundamental value, and the agency IS restricting it. Many signatories are safety researchers who support the pause but oppose the agency's implementation. Others are capability researchers who want restrictions lifted for self-interested reasons. The letter conflates both groups, and the media can't tell them apart. A prominent signatory goes on television: \"The agency has made it illegal to understand the very technology we need to make safe. This is like banning oncology research because cancer is dangerous.\"","bars":"saf ↓ if restrictions maintained (research slowed by controversy), pol ↓ if restrictions maintained (lose academic community), alg ↑ if restrictions loosened (more gets published)","barCount":4,"refs":["#research--born-dangerous-pub","#research--approval-dilemma"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--low-salience-campaign","type":"preparation","rawType":"preparation","cluster":"isia","entities":["isia-comms","public-cluster-indiff"],"topics":["#public-opinion","#narrative"],"situation":"Internal strategy meeting. Comms director presents data: 38% of the population in treaty nations is in the indifferent cluster — \"AI is not a topic I think about.\" These people don't oppose the pause; they don't think about it at all. They vote on other issues. They're invisible in polls about AI because they skip those questions. But they VOTE, and politicians know their AI-indifferent constituents won't punish them for cutting the agency's budget. The comms team proposes three strategies to reach the indifferent cluster: 1. **Scare campaign:** Graphic visualization of ASI extinction scenarios. Gets attention fast but risks being dismissed as fearmongering, and fear-based messaging has diminishing returns (the public habituates). 2. **Personal relevance:** Frame ASI risk through things people already care about — their children's survival, their retirement savings, their community's future. Slower but more durable. 3. **Do nothing:** The indifferent cluster has no reason to oppose the agency. Let sleeping dogs lie — activation risks creating opinions the agency can't control. The third option is genuinely reasonable: activating the indifferent cluster might produce MORE skeptics than supporters, because the agency can't control what conclusions newly-attentive people reach.","bars":"pol ↑ if campaign works (uncertain), pol ↓ if campaign backfires or budget spent with no return","barCount":1,"refs":["#pol--success-narrative","#era--generational-shift"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--deepfake-election-interference","type":"crisis","rawType":"crisis","cluster":"journalist","entities":["journalist","gov-treaty-major","public-cluster-skeptic","isia-comms"],"topics":["#ai-diffusion","#election","#narrative","#public-opinion"],"situation":"Three weeks before a critical election in a major treaty nation, AI-generated deepfakes flood social media: fabricated recordings of the pro-pause candidate saying contradictory things, fake news articles from real outlet mastheads, synthetic phone calls to voters from \"campaign volunteers\" who don't exist. All produced by sub-threshold AI systems — perfectly legal under the treaty. The pro-pause candidate's polling drops 6 points. The anti-pause candidate's campaign denies involvement but benefits. The ISIA's AI forensics team can identify the deepfakes as synthetic — but there are thousands, and debunking at scale is impossible. The devastating irony: the technology the treaty permits is being used to destroy the political support the treaty requires. And if the agency intervenes in a domestic election — even to defend truth — it confirms the \"surveillance state\" narrative.","bars":"pol ↓↓ if anti-pause candidate wins, pol ↓ if agency intervention discovered","barCount":2,"refs":["#civil--deepfake-isia-director","#pol--election-year"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#civil--upload-milestone-panic","type":"consequence","rawType":"consequence","cluster":"researcher","entities":["researcher-safety","public-cluster-fear","public-cluster-skeptic","isia-comms"],"topics":["#uploading","#public-opinion","#narrative","#ethics"],"situation":"A university team in Zurich successfully uploads and runs a functional neural simulation of a mouse brain at 1:1 fidelity for 48 hours. The paper is on the cover of Nature. This is a genuine scientific milestone — and politically explosive. Three reactions hit simultaneously: 1. The safety community is cautiously optimistic: whole-brain emulation could eventually let researchers work 10^6x faster, which might be the only way to solve alignment in time. 2. Religious organizations are horrified: \"They're copying souls.\" The megachurch coalition threatens to withdraw political support for the pause if uploading research continues. 3. The general public is scared: \"If they can copy a mouse brain, how long until they copy mine?\" Privacy concerns spike. People who never thought about AI suddenly care — but about uploading, not ASI. The agency must decide whether to regulate uploading research (not technically within its ASI mandate) or let it proceed as a potential path to solving alignment.","bars":"pol ↓ if mandate expanded (overreach perception), saf ↑ if uploading proceeds (long-term research path)","barCount":2,"refs":["#research--biotech-proposal","#civil--megachurch-sermon"],"file":"events-brainstorm-civil-society.md","isOrphan":false},{"id":"#enf--inference-chip-loophole","type":"report","rawType":"report","cluster":"chip","entities":["chip-fab","isia-enforcement","isia-safety-team"],"topics":["#chip-monitoring","#chip-supply","#algorithmic-progress"],"situation":"Samsung's latest chip generation is optimized for inference, not training — different thermal profile, different interconnect architecture, different power draw patterns. ISIA's monitoring infrastructure was designed to detect training clusters: high inter-chip bandwidth, sustained FLOP bursts, specific power signatures. The chief scientist's team has been warning for months that algorithmic advances now allow training-equivalent workloads to be decomposed into inference-shaped operations. 800 of these new inference chips, running a distributed training protocol disguised as batch inference, could execute a training run the monitoring system would classify as a permitted commercial deployment. Samsung argues these chips serve a legitimate $40B inference market and shouldn't be controlled. The ISIA safety team says the distinction between \"training chip\" and \"inference chip\" is becoming meaningless — all that matters is FLOP throughput, and these chips have it.","bars":"int ↓ if blind spot accepted, pol ↓ if industry fights expanded monitoring","barCount":2,"refs":["#mon--consumer-hw-threshold"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--billionaire-island-raid","type":"crisis","rawType":"crisis","cluster":"isia","entities":["isia-enforcement","rogue-billionaire","interpol","natl-enforcement"],"topics":["#raid","#jurisdiction","#smuggling","#training-run"],"situation":"Intelligence points to a former tech CEO running an unauthorized compute cluster on a private island in international waters off the coast of Tonga. Satellite imagery shows a facility with heat output consistent with ~3,000 chips. The island was purchased through shell companies registered in the Cayman Islands. ISIA has no jurisdiction in international waters. Tonga's coast guard has three boats. The billionaire's legal team has already filed preemptive injunctions in five countries arguing that international waters are outside the treaty's scope. The enforcement team presents three options, each with a different legal, political, and operational profile. If ISIA waits for the legal process, the training run may complete before a ruling. If ISIA acts unilaterally, the precedent terrifies every nation that values sovereignty.","bars":"pol ↓↓ if unilateral action, int ↓ if reveals methods, pol ↑ if legal route succeeds (but only eventually)","barCount":2,"refs":["#mon--near-miss","#treaty--diplo-incident"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--cops-refuse-gpu-search","type":"crisis","rawType":"crisis","cluster":"natl","entities":["natl-enforcement","isia-enforcement","public-cluster-liberty"],"topics":["#raid","#jurisdiction","#chip-monitoring","#surveillance"],"situation":"ISIA has identified 14 addresses in the American Midwest where anomalous power draw patterns suggest unauthorized compute clusters hidden in residential basements. The enforcement protocol requires coordination with local law enforcement to execute search warrants. Problem: the county sheriff's department has refused. The sheriff, elected on a civil-liberties platform, tells media: \"I'm not sending my deputies to kick in doors over graphics cards. This is federal overreach.\" Three other rural sheriffs in the region publicly back him. Local opinion polls show 68% support for the sheriff's position. The FBI can override local enforcement, but that creates a Waco-style optics problem. Meanwhile, the 14 addresses represent enough compute — if networked — for a training run at ~1.5x the current enforcement threshold.","bars":"pol ↓ if FBI escalation, int ↓ if delay lets clusters relocate","barCount":2,"refs":["#inst--zealous-officer","#mon--surveillance-expand"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--decommission-graveyard","type":"report","rawType":"report","cluster":"isia","entities":["isia-enforcement","gov-treaty-minor","chip-fab"],"topics":["#chip-monitoring","#chip-supply","#black-market"],"situation":"Annual chip lifecycle audit reveals a discrepancy: 23,000 H100-equivalent chips were declared \"decommissioned and destroyed\" over the past 18 months across twelve treaty nations. ISIA's verification protocol requires photographic evidence of physical destruction (crushed wafers, smelted casings). Internal review finds that 40% of the destruction certificates were filed by three contracted disposal firms — and one of those firms went bankrupt six months ago. Its warehouse in Romania contains no destroyed chips. Either 9,200 chips were destroyed before storage (no evidence), diverted to the black market, or are sitting in an unmonitored location. The chip graveyard problem: destroying advanced hardware feels wasteful, especially when nations are paying billions for new chips. Every chip scheduled for destruction is a temptation.","bars":"int ↓ if chips unaccounted for, pol ↓ if audit angers allies","barCount":2,"refs":["#mon--black-market-signal","#mon--smuggle-ring"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--power-grid-anomaly","type":"report","rawType":"report","cluster":"isia","entities":["isia-intel","isia-enforcement","natl-enforcement"],"topics":["#chip-monitoring","#sigint","#training-run"],"situation":"ISIA's power-grid monitoring partnership with national utilities flags an anomaly: a decommissioned aluminum smelter in northern Norway has been drawing 12 MW of power continuously for the past six weeks. The facility was sold two years ago to a holding company. Local utility records show the buyer paid for a massive electrical upgrade but listed the purpose as \"cryptocurrency mining.\" Crypto mining at this scale is legal and common in Norway. The heat signature is ambiguous — could be ASICs mining Bitcoin or GPUs running training. The inter-chip bandwidth signature, however, is unusual for mining: the facility's internet connection was recently upgraded to 400 Gbps symmetric, which is overkill for crypto but consistent with distributed training. The Norwegian government considers this a domestic energy matter and hasn't flagged it. Your power-grid analyst says she's 70% confident this is a training operation, 30% it's legitimate mining.","bars":"int ↓ if method burned on inspection, int ↑ if passive monitoring yields intel","barCount":1,"refs":["#mon--heat-sig-foreign","#intel--contradictory-briefs"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--network-bandwidth-trap","type":"crisis","rawType":"crisis","cluster":"isia","entities":["isia-intel","isia-ai-tools","rogue-lab"],"topics":["#chip-monitoring","#sigint","#false-positive","#training-run"],"situation":"ISIA's network monitoring AI flags a cluster of facilities across Southeast Asia with coordinated high-bandwidth traffic patterns consistent with a distributed training run spread across four countries. The AI assigns 94% confidence. Enforcement mobilizes raid teams in Thailand, Vietnam, Malaysia, and Indonesia — a massive coordinated operation requiring cooperation from four national enforcement agencies, costing roughly $2M and consuming the enforcement division's capacity for two weeks. Then the network analysis team raises a concern: the traffic pattern also matches a new distributed rendering farm for a Vietnamese film studio that just signed a deal with a Thai animation company. The AI's training data didn't include cross-border creative industry compute patterns. If the raids proceed and find a film studio, the agency looks incompetent. If the raids don't proceed and it IS a training run distributed across four jurisdictions specifically to avoid single-country detection thresholds, the agency missed a sophisticated evasion.","bars":"pol ↓↓ if raids find film studio, int ↓ if delay lets real violator escape","barCount":2,"refs":["#ai--false-positive-batch","#mon--smuggle-ring"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--cat-mouse-adapt","type":"consequence","rawType":"consequence","cluster":"isia","entities":["isia-enforcement","smuggler","rogue-lab"],"topics":["#smuggling","#chip-monitoring","#raid","#training-run"],"situation":"After ISIA's successful raid on the chip smuggling ring last quarter (seized 2,000 chips, six arrests), the enforcement team expected a deterrence effect. Instead, intelligence shows the opposite: smuggling networks adapted within weeks. The new techniques: chips are now physically modified — serial numbers ground off, firmware reflashed with fake identifiers — before crossing borders. Shipping routes shifted from commercial freight (where ISIA has inspection agreements) to private aviation and diplomatic pouches. One network is breaking chips into individual units, shipping them separately through consumer electronics channels (disguised as gaming GPUs), and reassembling clusters at the destination. The enforcement chief reports: \"Every raid teaches them more about our methods than it teaches us about theirs. We disrupted one network and created three smaller, more resilient ones.\" The cat-and-mouse has escalated.","bars":"int ↓ (current methods degraded), pol ↑ if public sees enforcement action","barCount":2,"refs":["#mon--smuggle-ring","#mon--black-market-signal"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--politically-inconvenient-true-positive","type":"crisis","rawType":"crisis","cluster":"isia","entities":["isia-enforcement","isia-intel","gov-treaty-major"],"topics":["#chip-monitoring","#training-run","#challenge-inspection","#raid"],"situation":"ISIA's monitoring system detects an unauthorized training run inside a treaty nation — not a minor ally but the United States' largest military AI research facility. The run is at 4x the permitted threshold. The facility is operated by DARPA under a classified defense program. The American ambassador, when quietly informed, says: \"This is a national security program. We will not permit inspection. If you go public, we will withdraw from the treaty.\" Intelligence confirms the run is real and the threat is real. The American program is likely training a military planning AI, not pursuing ASI — but the compute level could produce dangerous capabilities as a side effect. The ISIA's credibility depends on enforcing the rules against everyone, including its most powerful member. But losing the United States from the treaty would collapse enforcement globally.","bars":"pol ↓↓ if US withdraws, int ↓ if classified exemption hides compute from monitoring","barCount":2,"refs":["#natl-intel--jurisdiction-clash","#treaty--five-year-review"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--old-chips-new-tricks","type":"report","rawType":"report","cluster":"isia","entities":["isia-enforcement","isia-safety-team","researcher-capability"],"topics":["#chip-monitoring","#algorithmic-progress","#threshold-drop"],"situation":"The safety team presents a disturbing analysis. Five years of algorithmic progress (now at ~4x 2022 efficiency) means that older-generation chips — A100s, V100s, even some consumer RTX 4090s — which were below the monitoring threshold when the treaty was signed, can now collectively produce training runs that would have required monitored H100 clusters at the start of the pause. The problem: these older chips were explicitly excluded from consolidation in the original treaty because they weren't powerful enough to matter. There are an estimated 3.8 million of these chips in circulation — in universities, gaming PCs, small businesses, render farms. They were never tracked. They were never registered. Many have changed hands multiple times on the secondhand market. Bringing them under monitoring now would require retroactively expanding the treaty's scope to cover hardware that millions of ordinary people own. The enforcement chief calls it \"trying to register every kitchen knife because a chef figured out how to perform surgery with one.\"","bars":"int ↓↓ (massive new blind spot), pol ↓ if treaty amendment attempted","barCount":2,"refs":["#mon--consumer-hw-threshold","#era--threshold-crisis"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--datacenter-inside-datacenter","type":"crisis","rawType":"crisis","cluster":"rogue","entities":["rogue-lab","isia-enforcement","ai-company"],"topics":["#training-run","#chip-monitoring","#raid"],"situation":"A whistleblower at a major cloud provider reports that a customer has been renting \"inference capacity\" at a legitimate, ISIA-monitored datacenter — but the workloads are not inference. The customer's VMs are running a distributed training framework hidden inside what looks like thousands of independent inference requests. Each individual request is small and permitted. But the whistleblower discovered the requests are coordinated: they share gradients through an encrypted side channel routed through a separate network. In aggregate, they constitute a training run at roughly 2x the enforcement threshold. The datacenter operator had no idea — their monitoring only checks individual job sizes, not cross-job coordination. The violator is exploiting the gap between \"chip-level monitoring\" (which sees individual permitted jobs) and \"cluster-level monitoring\" (which would catch the coordination, but doesn't exist for multi-tenant cloud environments). The cloud provider's CEO asks for discretion: \"If this becomes public, every customer will assume we're spying on their workloads. Our business is finished.\"","bars":"int ↑ if side channel analyzed, pol ↓ if public raid harms industry","barCount":2,"refs":["#enf--inference-chip-loophole","#mon--near-miss"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--custom-asic-foundry","type":"report","rawType":"report","cluster":"isia","entities":["isia-intel","chip-fab","rogue-state"],"topics":["#chip-supply","#chokepoint","#chip-monitoring"],"situation":"Signals intelligence reveals that a non-treaty nation has been developing its own ASIC (application-specific integrated circuit) optimized for AI training — fabricated at a domestic foundry using older lithography equipment (not EUV, so outside ASML's chokepoint). The chips are individually much weaker than monitored H100s — roughly 1/50th the performance per chip. But the nation has been manufacturing them for two years. Estimated production: 200,000 units. At 4x algorithmic efficiency (current level), 50,000 of these chips networked together would match the compute of 1,000 H100s — well above the training threshold. The enforcement framework assumed that advanced AI chips require advanced fabrication (EUV lithography, TSMC-level precision). This assumption was correct when the treaty was signed. Algorithmic progress has made it wrong. The chokepoint the entire enforcement architecture relies on — the scarcity of advanced chip fabrication — is eroding from below.","bars":"int ↓↓ (massive new threat vector), pol ↓ if treaty renegotiation fails","barCount":2,"refs":["#mon--asml-joint-venture","#intl--covert-program"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#enf--disposal-officer-bribery","type":"crisis","rawType":"crisis","cluster":"isia","entities":["isia-enforcement","isia-internal-sec","smuggler"],"topics":["#chip-monitoring","#chip-supply","#black-market"],"situation":"Internal security flags a pattern: one of ISIA's own chip disposal officers — responsible for witnessing and certifying the destruction of decommissioned chips — has been living beyond his means. New car, renovated apartment, expensive vacations. His destruction certifications show nothing unusual, but a forensic review of his routes reveals that on 11 occasions over the past year, the GPS tracker on his vehicle was disabled for 2-4 hours during scheduled destruction runs. During those gaps, the chips he was supposed to witness being destroyed could have been diverted. Estimated volume if all gaps involved diversion: ~1,400 chips. The disposal officer has 14 years of service and a clean record. He processed the chips alone because ISIA's budget was cut and the two-person verification protocol was suspended to save money. The budget cut was your decision, six months ago, when funding was tight.","bars":"pol ↓ if corruption goes public, int ↓ (1,400 chips unaccounted for)","barCount":2,"refs":["#enf--decommission-graveyard","#inst--mole"],"file":"events-brainstorm-enforcement.md","isOrphan":false},{"id":"#intl--airstrike-debate","type":"crisis","rawType":"crisis","cluster":"military","entities":["military","un-security-council","gov-treaty-major","isia-enforcement"],"topics":["#protective-action","#covert-program","#treaty-negotiation"],"situation":"Enforcement has failed diplomatically against a non-treaty nation running a confirmed large-scale compute cluster. The Executive Council has voted to refer the matter to the UN Security Council for protective action under Treaty Article XII. The military option is on the table: precision airstrikes on the facility's power infrastructure, destroying the compute cluster without direct casualties. But the target nation has conventional military allies. The US Joint Chiefs present a strike plan. China abstains from the Security Council vote — they don't veto, but they won't endorse. If the strike proceeds and escalates into a conventional military conflict, does the pause survive?","bars":"pol ↓↓ if strike (international backlash even from allies), int ↓ if cyber op (reveals capabilities)","barCount":2,"refs":["#intl--post-strike-fallout","#intl--north-korea-pattern"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--post-strike-fallout","type":"consequence","rawType":"consequence","cluster":"gov","entities":["gov-treaty-minor","gov-treaty-major","treaty-council"],"topics":["#protective-action","#treaty-negotiation","#withdrawal"],"situation":"The airstrike succeeded — the compute cluster is destroyed. But the consequences are cascading. The targeted nation's regional allies are furious. Two treaty nations with close ties to the target announce they're \"reviewing their treaty commitments.\" A third, privately, tells your diplomat: \"If this is what the treaty means, we never should have signed.\" Meanwhile, the strike footage is on every screen worldwide. Opinion clusters are splitting: some see proof the agency protects humanity, others see a Western military alliance hiding behind an international treaty. The non-aligned movement calls an emergency session. Russia, which has been a lukewarm treaty member, introduces a UN resolution condemning the strike.","bars":"pol ↓↓ (international crisis), int ↓ (intelligence relationships strained with wavering nations)","barCount":2,"refs":["#intl--airstrike-debate","#treaty--review-conference"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--emperor-billionaire","type":"crisis","rawType":"crisis","cluster":"rogue","entities":["rogue-billionaire","public-cluster-accel","isia-enforcement","natl-enforcement"],"topics":["#ideology","#training-run","#smuggling","#raid"],"situation":"A tech billionaire — net worth $140B, citizenship in three countries, private island compound in international waters — has been publicly advocating that \"the species that builds superintelligence first inherits the universe.\" Your intel division has been tracking him for two years. He's been acquiring chips through 14 shell companies across 8 jurisdictions. Satellite imagery shows construction on his island compound consistent with a liquid-cooled datacenter. He has a following: 40 million social media followers, many in the \"ASI will serve whoever builds it first\" opinion cluster. His lawyers have already filed preemptive suits in three jurisdictions challenging ISIA authority over international waters. He gave a speech last week: \"History will remember the ISIA the way we remember the Inquisition — a frightened institution that tried to prevent the inevitable.\"","bars":"pol ↓ (public spectacle either way), int ↓ (enforcement reveals methods)","barCount":2,"refs":["#mon--smuggle-ring","#intl--emperor-manifesto"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--emperor-manifesto","type":"consequence","rawType":"consequence","cluster":"rogue","entities":["rogue-billionaire","public-cluster-accel","isia-comms","journalist"],"topics":["#ideology","#public-opinion","#narrative"],"situation":"Whether you stopped the billionaire or not, his 80-page manifesto has gone viral. \"The Case for Cosmic Ambition\" argues that the pause is condemning humanity to mediocrity and that superintelligence is humanity's destiny. It's well-written, passionate, and wrong in ways that require technical expertise to rebut. Three bestselling authors have endorsed it. University students are organizing \"Free the Future\" rallies. The accelerationist opinion cluster has grown 6 percentage points in two months. Your comms director says: \"We can't out-argue a vision of the future with warnings about risk. He's selling hope. We're selling fear.\"","bars":"pol ↓ (either way the accelerationist movement grows)","barCount":1,"refs":["#intl--emperor-billionaire","#pol--election-year"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--weight-theft-state","type":"crisis","rawType":"crisis","cluster":"ai","entities":["ai-company","natl-intel","gov-treaty-major","isia-intel"],"topics":["#model-weights","#covert-program","#sigint"],"situation":"A frontier AI lab (treaty-compliant, operating under ISIA oversight) reports a catastrophic security breach. Their latest model's weights — the product of a legally sanctioned training run — have been exfiltrated. The lab's forensics team and NSA jointly conclude: this was a state intelligence service operation, almost certainly China's MSS. The weights represent the most capable AI system in existence, still well below ASI but significantly above the public frontier. China denies everything. Your intelligence division confirms: the exfiltration signatures match known MSS tradecraft. The weights are just data — once copied, they cannot be un-copied. China now has them. The question isn't whether they have the weights. The question is what they do next.","bars":"int ↓ (intelligence relationship with China damaged), pol ↓ (if confronted publicly, China may retaliate diplomatically)","barCount":2,"refs":["#intl--china-weights-deployed","#natl-intel--data-center-attack"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--china-weights-deployed","type":"consequence","rawType":"consequence","cluster":"gov","entities":["gov-treaty-major","isia-intel","isia-enforcement"],"topics":["#model-weights","#covert-program","#training-run","#sanctions"],"situation":"Six months after the weight theft. Intelligence reports that China has deployed the stolen model internally — not for further training, but as an analysis and planning tool across military and economic applications. They haven't violated the training-run threshold (the model already existed; they're just running it). But they've gained a massive capability advantage without performing any detectable training. Your legal team is split: \"Possessing stolen weights isn't explicitly prohibited by the treaty — the treaty regulates training runs, not inference.\" The US is furious and demanding action. China's position: \"We don't know what you're talking about, and even if we did, running an existing model isn't a treaty violation.\" They're technically correct.","bars":"int ↓ (China has advanced capabilities outside monitoring), pol ↓ (US demands action ISIA can't deliver)","barCount":2,"refs":["#intl--weight-theft-state","#treaty--review-conference"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--challenge-inspection-veto","type":"crisis","rawType":"crisis","cluster":"treaty","entities":["treaty-council","gov-treaty-major","isia-enforcement","isia-intel"],"topics":["#challenge-inspection","#treaty-negotiation","#covert-program"],"situation":"ISIA intelligence has identified suspicious activity at a facility in a major treaty nation — thermal signatures, unusual network traffic, personnel movements consistent with a covert training operation. You invoke a challenge inspection under Article IX: any Council member can request one, and a simple majority of the 15-member Executive Council must approve. The target nation is a major power with strong Council allies. The vote is 7-7 with one abstention. The challenge inspection fails. Your intelligence chief says: \"They're hiding something. The vote was a political calculation, not a technical assessment. Three nations that voted no have bilateral trade deals pending with the target.\" The intelligence will go stale within weeks — if they're running a training operation, they'll relocate once they know you suspect them.","bars":"pol ↓ (if leaked, trust in ISIA plummets among Council members), int ↓ (intelligence goes stale)","barCount":2,"refs":["#natl-intel--jurisdiction-clash","#treaty--review-conference"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--insincere-member","type":"crisis","rawType":"crisis","cluster":"gov","entities":["gov-treaty-minor","isia-intel","isia-enforcement","smuggler"],"topics":["#covert-program","#chip-monitoring","#sanctions","#withdrawal"],"situation":"A mid-sized treaty nation — joined with great fanfare six years ago — has been running a shadow program the entire time. They signed the treaty to access the technology-sharing provisions and international prestige, but never intended to comply. Your intel team has been assembling evidence for 18 months: chips diverted from declared facilities to a military installation, a parallel chip procurement network through non-treaty intermediaries, and a research team operating under military classification beyond ISIA access. The evidence is strong but not airtight. The nation contributes meaningfully to the treaty's funding and hosts two ISIA regional offices. If you confront them, they may withdraw — and their withdrawal would encourage other wavering members. If you don't, you're tolerating a known violator.","bars":"pol ↓ (confrontation is politically costly), int ↓ (if they withdraw, you lose access to their hosted ISIA offices)","barCount":2,"refs":["#intl--north-korea-pattern","#treaty--withdrawal-threat"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--us-china-mutual-suspicion","type":"crisis","rawType":"crisis","cluster":"gov","entities":["gov-treaty-major","natl-intel","isia-intel","treaty-council"],"topics":["#covert-program","#challenge-inspection","#treaty-negotiation"],"situation":"The US ambassador privately requests a meeting. \"We have intelligence suggesting China is running undeclared compute at a facility in Xinjiang. We want a challenge inspection. But we won't share our intelligence methods with the Council — the source is too sensitive. We need ISIA to request the inspection on its own authority, using your own parallel intelligence.\" Your own intelligence is suggestive but inconclusive — you see anomalies, but nothing that would independently justify a challenge inspection. Meanwhile, China's ambassador requests a separate meeting the same week. \"We have reason to believe the United States is running an undeclared program at a facility in Utah. We want a challenge inspection.\" Both nations are core treaty members. Both are accusing the other. Neither will share their full intelligence. Both may be right. Both may be using the ISIA as a proxy for their bilateral rivalry. If you pursue one inspection and not the other, you look captured. If you pursue both, you might destabilize the two most important treaty relationships simultaneously.","bars":"pol ↓↓ (no matter what — both superpowers upset), int ↓ (if independent investigation launched, resources stretched)","barCount":2,"refs":["#inst--china-hawk","#intl--challenge-inspection-veto"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--small-nation-leverage","type":"crisis","rawType":"crisis","cluster":"gov","entities":["gov-treaty-minor","isia-political","gov-treaty-major"],"topics":["#treaty-negotiation","#hostage-gambit","#sanctions","#economic-pressure"],"situation":"A small but strategically located treaty nation — it hosts a critical undersea cable junction and a regional ISIA monitoring station — is demanding concessions entirely unrelated to AI. They want debt relief ($12B), a seat on the Executive Council, and trade preferences from treaty majors. Their leverage: \"We could withdraw from the treaty. Our monitoring station covers 40% of South Asian compute traffic. And we've had very interesting conversations with [non-treaty nation] about hosting their data centers.\" They are not threatening to build ASI — they are threatening to create an enforcement gap for others to exploit. This is extortion, but they're not wrong that the treaty disproportionately benefits large nations.","bars":"pol ↓ (either way — paying ransom or losing a monitoring station)","barCount":1,"refs":["#intl--hostage-gambit","#treaty--review-conference"],"file":"events-brainstorm-international.md","isOrphan":false},{"id":"#intl--war-and-pause","type":"crisis","rawType":"crisis","cluster":"military","entities":["military","gov-treaty-major","gov-treaty-minor","isia-enforcement"],"topics":["#military","#treaty-negotiation","#chip-monitoring","#withdrawal"],"situation":"A conventional war has broken out between two treaty nations over a territorial dispute entirely unrelated to AI. Both nations are demanding that the ISIA suspend inspections on their territory — \"we're at war; we can't have international inspectors wandering through active military zones.\" Both nations are also accusing the other of using the war as cover to run unauthorized training for military AI applications. Your satellite data shows unusual compute activity in both countries, but you can't determine whether it's military AI (potentially treaty-legal depending on classification) or forbidden training runs. The war itself threatens the chip supply chain — one of the nations is a secondary chip fabrication site. Three other treaty nations that border the conflict z     .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded));

  // Circle for each node
  node.append('circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => d.isGhost ? '#333' : typeColor(d.type))
    .attr('stroke', d => clusterColors[d.cluster] || '#888')
    .attr('stroke-width', d => d.isGhost ? 1 : 2)
    .attr('stroke-dasharray', d => d.isGhost ? '2,2' : 'none')
    .attr('opacity', d => d.isGhost ? 0.3 : 0.85);

  // Labels
  let showLabels = true;
  const labels = node.append('text')
    .text(d => d.id.replace('#', '').replace(/--/g, '/'))
    .attr('x', d => nodeRadius(d) + 4)
    .attr('y', 3)
    .attr('fill', '#aaa')
    .attr('font-size', '9px')
    .attr('font-family', 'inherit')
    .style('pointer-events', 'none');

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  node.on('mouseenter', (event, d) => {
    if (d.isGhost) {
      tooltip.innerHTML =
        '<span class="tt-id">' + d.id + '</span>' +
        '<span class="tt-type tt-broken" style="background:#e74c3c">MISSING</span>' +
        '<div class="tt-situation" style="color:#e74c3c">This event is referenced but not defined in any file.</div>';
    } else {
      const entityTags = d.entities.map(e => '<span class="tt-tag-entity">' + e + '</span>').join('');
      const topicTags = d.topics.map(t => '<span class="tt-tag-topic">' + t + '</span>').join('');
      const refsList = d.refs.length > 0
        ? '<div class="tt-refs">Refs: ' + d.refs.join(', ') + '</div>'
        : '';
      tooltip.innerHTML =
        '<span class="tt-id">' + d.id + '</span>' +
        '<span class="tt-type" style="background:' + typeColor(d.type) + '">' + d.rawType + '</span>' +
        '<div class="tt-situation">' + d.situation.slice(0, 300) + (d.situation.length > 300 ? '...' : '') + '</div>' +
        '<div class="tt-section"><span class="tt-label">Entities</span><div class="tt-tags">' + entityTags + '</div></div>' +
        '<div class="tt-section"><span class="tt-label">Topics</span><div class="tt-tags">' + topicTags + '</div></div>' +
        (d.bars ? '<div class="tt-bars">Bars: ' + d.bars + '</div>' : '') +
        refsList +
        '<div style="color:#666;font-size:10px;margin-top:4px">' + d.file + '</div>';
    }
    tooltip.style.display = 'block';

    // Highlight connected edges
    link.attr('stroke', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (sid === d.id || tid === d.id) return '#f0c040';
      return l.broken ? '#e74c3c' : '#444';
    }).attr('stroke-opacity', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (sid === d.id || tid === d.id) return 1;
      return l.broken ? 0.4 : 0.5;
    }).attr('stroke-width', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (sid === d.id || tid === d.id) return 2.5;
      return l.broken ? 1 : 1.2;
    }).attr('marker-end', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (sid === d.id || tid === d.id) return 'url(#arrow-highlight)';
      return l.broken ? 'url(#arrow-broken)' : 'url(#arrow)';
    });

    // Dim non-connected nodes
    node.select('circle').attr('opacity', n => {
      if (n.id === d.id) return 1;
      const connected = edges.some(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return (sid === d.id && tid === n.id) || (tid === d.id && sid === n.id);
      });
      return connected ? 0.9 : (n.isGhost ? 0.1 : 0.2);
    });
  })
  .on('mousemove', (event) => {
    let tx = event.pageX + 14;
    let ty = event.pageY + 14;
    if (tx + 380 > W) tx = event.pageX - 394;
    if (ty + 200 > H) ty = event.pageY - 200;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  })
  .on('mouseleave', () => {
    tooltip.style.display = 'none';
    // Reset highlights
    link.attr('stroke', d => d.broken ? '#e74c3c' : '#444')
      .attr('stroke-opacity', d => d.broken ? 0.4 : 0.5)
      .attr('stroke-width', d => d.broken ? 1 : 1.2)
      .attr('marker-end', d => d.broken ? 'url(#arrow-broken)' : 'url(#arrow)');
    node.select('circle').attr('opacity', d => d.isGhost ? 0.3 : 0.85);
  });

  // Tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.x - (dx / dist) * nodeRadius(d.target);
      })
      .attr('y2', d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.y - (dy / dist) * nodeRadius(d.target);
      });

    node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
  });

  // Drag handlers
  function dragStarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  function dragEnded(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  // Controls
  document.getElementById('btn-reset').addEventListener('click', () => {
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  });

  document.getElementById('btn-labels').addEventListener('click', function() {
    showLabels = !showLabels;
    labels.style('display', showLabels ? 'block' : 'none');
    this.classList.toggle('active', showLabels);
  });

  document.getElementById('btn-broken').addEventListener('click', function() {
    showBroken = !showBroken;
    link.filter(d => d.broken).style('display', showBroken ? 'block' : 'none');
    node.filter(d => d.isGhost).style('display', showBroken ? 'block' : 'none');
    this.classList.toggle('active', showBroken);
  });

  // Search
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) {
      node.select('circle').attr('opacity', d => d.isGhost ? 0.3 : 0.85);
      labels.attr('fill', '#aaa');
      return;
    }
    node.select('circle').attr('opacity', d => {
      const match = d.id.toLowerCase().includes(q)
        || d.entities.some(e => e.toLowerCase().includes(q))
        || d.topics.some(t => t.toLowerCase().includes(q))
        || d.situation.toLowerCase().includes(q)
        || d.cluster.toLowerCase().includes(q);
      return match ? 1 : 0.08;
    });
    labels.attr('fill', function(d) {
      const match = d.id.toLowerCase().includes(q)
        || d.entities.some(e => e.toLowerCase().includes(q))
        || d.topics.some(t => t.toLowerCase().includes(q))
        || d.situation.toLowerCase().includes(q)
        || d.cluster.toLowerCase().includes(q);
      return match ? '#f0c040' : '#333';
    });
  });

  // Resize handler
  window.addEventListener('resize', () => {
    const nw = window.innerWidth;
    const nh = window.innerHeight;
    svg.attr('width', nw).attr('height', nh);
  });
})();
</script>
</body>
</html>
