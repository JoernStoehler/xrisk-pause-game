ate","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["ai-company","natl-intel","gov-treaty-major","isia-intel"],"topics":["#model-weights","#covert-program","#sigint"],"situation":"A frontier AI lab (treaty-compliant, operating under ISIA oversight) reports a catastrophic security breach. Their latest model's weights — the product of a legally sanctioned training run — have been exfiltrated. The lab's forensics team and NSA jointly conclude: this was a state intelligence service operation, almost certainly China's MSS. The weights represent the most capable AI system in existence, still well below ASI but significantly above the public frontier. China denies everything. Your intelligence division confirms: the exfiltration signatures match known MSS tradecraft. The weights are just data — once copied, they cannot be un-copied. China now has them. The question isn't whether they have the weights. The question is what they do next.","bars":"int ↓ (intelligence relationship with China damaged), pol ↓ (if confronted publicly, China may retaliate diplomatically)","barCount":2,"refs":["#intl--china-weights-deployed","#natl-intel--data-center-attack"],"file":"events-brainstorm-international.md","degree":9},{"id":"event:#intl--china-weights-deployed","label":"intl--china-weights-deployed","nodeType":"event","eventType":"consequence","rawType":"consequence","entities":["gov-treaty-major","isia-intel","isia-enforcement"],"topics":["#model-weights","#covert-program","#training-run","#sanctions"],"situation":"Six months after the weight theft. Intelligence reports that China has deployed the stolen model internally — not for further training, but as an analysis and planning tool across military and economic applications. They haven't violated the training-run threshold (the model already existed; they're just running it). But they've gained a massive capability advantage without performing any detectable training. Your legal team is split: \"Possessing stolen weights isn't explicitly prohibited by the treaty — the treaty regulates training runs, not inference.\" The US is furious and demanding action. China's position: \"We don't know what you're talking about, and even if we did, running an existing model isn't a treaty violation.\" They're technically correct.","bars":"int ↓ (China has advanced capabilities outside monitoring), pol ↓ (US demands action ISIA can't deliver)","barCount":2,"refs":["#intl--weight-theft-state","#treaty--review-conference"],"file":"events-brainstorm-international.md","degree":9},{"id":"event:#intl--challenge-inspection-veto","label":"intl--challenge-inspection-veto","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["treaty-council","gov-treaty-major","isia-enforcement","isia-intel"],"topics":["#challenge-inspection","#treaty-negotiation","#covert-program"],"situation":"ISIA intelligence has identified suspicious activity at a facility in a major treaty nation — thermal signatures, unusual network traffic, personnel movements consistent with a covert training operation. You invoke a challenge inspection under Article IX: any Council member can request one, and a simple majority of the 15-member Executive Council must approve. The target nation is a major power with strong Council allies. The vote is 7-7 with one abstention. The challenge inspection fails. Your intelligence chief says: \"They're hiding something. The vote was a political calculation, not a technical assessment. Three nations that voted no have bilateral trade deals pending with the target.\" The intelligence will go stale within weeks — if they're running a training operation, they'll relocate once they know you suspect them.","bars":"pol ↓ (if leaked, trust in ISIA plummets among Council members), int ↓ (intelligence goes stale)","barCount":2,"refs":["#natl-intel--jurisdiction-clash","#treaty--review-conference"],"file":"events-brainstorm-international.md","degree":9},{"id":"event:#intl--insincere-member","label":"intl--insincere-member","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["gov-treaty-minor","isia-intel","isia-enforcement","smuggler"],"topics":["#covert-program","#chip-monitoring","#sanctions","#withdrawal"],"situation":"A mid-sized treaty nation — joined with great fanfare six years ago — has been running a shadow program the entire time. They signed the treaty to access the technology-sharing provisions and international prestige, but never intended to comply. Your intel team has been assembling evidence for 18 months: chips diverted from declared facilities to a military installation, a parallel chip procurement network through non-treaty intermediaries, and a research team operating under military classification beyond ISIA access. The evidence is strong but not airtight. The nation contributes meaningfully to the treaty's funding and hosts two ISIA regional offices. If you confront them, they may withdraw — and their withdrawal would encourage other wavering members. If you don't, you're tolerating a known violator.","bars":"pol ↓ (confrontation is politically costly), int ↓ (if they withdraw, you lose access to their hosted ISIA offices)","barCount":2,"refs":["#intl--north-korea-pattern","#treaty--withdrawal-threat"],"file":"events-brainstorm-international.md","degree":10},{"id":"event:#intl--us-china-mutual-suspicion","label":"intl--us-china-mutual-suspicion","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["gov-treaty-major","natl-intel","isia-intel","treaty-council"],"topics":["#covert-program","#challenge-inspection","#treaty-negotiation"],"situation":"The US ambassador privately requests a meeting. \"We have intelligence suggesting China is running undeclared compute at a facility in Xinjiang. We want a challenge inspection. But we won't share our intelligence methods with the Council — the source is too sensitive. We need ISIA to request the inspection on its own authority, using your own parallel intelligence.\" Your own intelligence is suggestive but inconclusive — you see anomalies, but nothing that would independently justify a challenge inspection. Meanwhile, China's ambassador requests a separate meeting the same week. \"We have reason to believe the United States is running an undeclared program at a facility in Utah. We want a challenge inspection.\" Both nations are core treaty members. Both are accusing the other. Neither will share their full intelligence. Both may be right. Both may be using the ISIA as a proxy for their bilateral rivalry. If you pursue one inspection and not the other, you look captured. If you pursue both, you might destabilize the two most important treaty relationships simultaneously.","bars":"pol ↓↓ (no matter what — both superpowers upset), int ↓ (if independent investigation launched, resources stretched)","barCount":2,"refs":["#inst--china-hawk","#intl--challenge-inspection-veto"],"file":"events-brainstorm-international.md","degree":9},{"id":"event:#intl--small-nation-leverage","label":"intl--small-nation-leverage","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["gov-treaty-minor","isia-political","gov-treaty-major"],"topics":["#treaty-negotiation","#hostage-gambit","#sanctions","#economic-pressure"],"situation":"A small but strategically located treaty nation — it hosts a critical undersea cable junction and a regional ISIA monitoring station — is demanding concessions entirely unrelated to AI. They want debt relief ($12B), a seat on the Executive Council, and trade preferences from treaty majors. Their leverage: \"We could withdraw from the treaty. Our monitoring station covers 40% of South Asian compute traffic. And we've had very interesting conversations with [non-treaty nation] about hosting their data centers.\" They are not threatening to build ASI — they are threatening to create an enforcement gap for others to exploit. This is extortion, but they're not wrong that the treaty disproportionately benefits large nations.","bars":"pol ↓ (either way — paying ransom or losing a monitoring station)","barCount":1,"refs":["#intl--hostage-gambit","#treaty--review-conference"],"file":"events-brainstorm-international.md","degree":9},{"id":"event:#intl--war-and-pause","label":"intl--war-and-pause","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["military","gov-treaty-major","gov-treaty-minor","isia-enforcement"],"topics":["#military","#treaty-negotiation","#chip-monitoring","#withdrawal"],"situation":"A conventional war has broken out between two treaty nations over a territorial dispute entirely unrelated to AI. Both nations are demanding that the ISIA suspend inspections on their territory — \"we're at war; we can't have international inspectors wandering through active military zones.\" Both nations are also accusing the other of using the war as cover to run unauthorized training for military AI applications. Your satellite data shows unusual compute activity in both countries, but you can't determine whether it's military AI (potentially treaty-legal depending on classification) or forbidden training runs. The war itself threatens the chip supply chain — one of the nations is a secondary chip fabrication site. Three other treaty nations that border the conflict zone are quietly asking whether the treaty requires them to choose sides. The treaty says nothing about what happens during a conventional war between members.","bars":"pol ↓↓ (massive diplomatic crisis), int ↓ (monitoring gaps in conflict zone)","barCount":2,"refs":["#intl--taiwan-crisis","#mon--heat-sig-foreign"],"file":"events-brainstorm-international.md","degree":10},{"id":"event:#intl--sanctions-evasion-network","label":"intl--sanctions-evasion-network","nodeType":"event","eventType":"report","rawType":"report","entities":["isia-enforcement","interpol","smuggler","gov-non-treaty"],"topics":["#sanctions","#smuggling","#chip-supply","#covert-program"],"situation":"Intelligence briefing from Interpol's financial crimes unit. A sanctioned non-treaty nation has built a sophisticated sanctions evasion network over four years: 23 shell companies across 11 jurisdictions, legitimate-looking technology firms that buy chips for declared purposes then reroute them, a parallel shipping network using containerized datacenter modules disguised as telecommunications equipment, and — most concerning — at least two complicit officials in treaty nations' customs agencies who were bribed to look the other way. The network has moved an estimated 6,000 H100-equivalents. The briefing concludes: \"This network is modeled on Iranian nuclear sanctions evasion — same lawyers, some of the same logistics firms. They learned from 20 years of sanctions evasion practice in other domains. We are not the first international regime they've studied how to beat.\"","bars":"(shifts understanding — the enforcement problem is harder than you thought)","barCount":0,"refs":["#mon--smuggle-ring","#intl--insincere-member"],"file":"events-brainstorm-international.md","degree":10},{"id":"event:#saf--airgap-large-experiment","label":"saf--airgap-large-experiment","nodeType":"event","eventType":"preparation","rawType":"preparation","entities":["isia-safety-team","isia-research-ctrl","isia-enforcement"],"topics":["#safety-research","#experiment","#dual-use"],"situation":"The Chief Scientist wants to run ISIA's largest safety experiment yet: training a model at 2x10^23 FLOP to test a corrigibility hypothesis. Before the DG can even consider the science, two preconditions must be met. First, the airgap: the experiment compute cluster must be physically and electronically isolated so that (a) the model can't reach the internet, and (b) algorithmic insights from the experiment can't leak into the broader ML community. ISIA's current airgap facility was built for experiments 10x smaller. Upgrading it costs $400M and takes 8 months. Second, intelligence: ISIA needs to be confident the experiment won't accidentally cross the lethal threshold. At current algorithmic progress (~3x 2022 efficiency), the safety team estimates the lethal threshold is somewhere above 10^25 FLOP — but that's a rough estimate with wide error bars. The experiment is 50x below the estimate, which sounds safe, but the estimate itself could be wrong by an order of magnitude. If int is high, ISIA has better models of the threshold. If int is low, the error bars are enormous. The DG must decide: invest in the preconditions first, or skip them and hope the current setup is good enough?","bars":"saf ↓ if delayed (slower research), alg ↑ if airgap fails (leaked insights), saf ↑ if run successfully","barCount":2,"refs":["#research--approval-dilemma","#research--training-run-consequence"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--internal-monitoring-expansion","label":"saf--internal-monitoring-expansion","nodeType":"event","eventType":"preparation","rawType":"preparation","entities":["isia-safety-team","isia-internal-sec","isia-research-ctrl"],"topics":["#safety-research","#experiment","#research-approval"],"situation":"ISIA's safety department has grown from 40 researchers to 340 over three years. The Chief Scientist wants to expand further to 600 — she has identified genuinely promising research threads that need staffing. But internal security raises a red flag: at 340 people, the department already has monitoring gaps. Three incidents in the past year where junior researchers ran unauthorized small-scale experiments on their workstations (consumer GPUs, below any compute threshold, but each was an ML training run the department didn't sanction). None produced anything dangerous, but the pattern is clear: a fraction of researchers, immersed in the most fascinating technical problems of the century, will experiment without permission. At 340, internal security can investigate incidents after the fact. At 600, with the current monitoring budget, they can't even do that. The DG faces a question: is the safety department well-monitored enough to safely expand? If monitoring is strong and the department is well-positioned (high int), massive expansion is low-risk. If monitoring is weak (low int), every additional researcher is another potential source of unsanctioned capability progress.","bars":"saf ↑ if expanded with good monitoring, alg ↑ if unsanctioned experiments leak, int ↓ if monitoring stretched thin","barCount":3,"refs":["#research--stepping-on-toes","#inst--mole"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--funding-deal-pentagon","label":"saf--funding-deal-pentagon","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["isia-safety-team","gov-treaty-major","isia-political"],"topics":["#safety-research","#dual-use","#lobbying"],"situation":"The US Department of Defense offers ISIA $2.8 billion in additional safety research funding — more than ISIA's entire current research budget. The catch: the Pentagon wants \"co-development rights\" on any safety research with military applications. Specifically, they want ISIA's interpretability tools to be adapted for military AI systems. The Chief Scientist says the money would fund three critical research threads currently bottlenecked by resources. The legal team says the co-development clause effectively gives the Pentagon access to dual-use knowledge that could accelerate military AI capabilities. The political advisor says refusing the largest funder in the treaty coalition will cost the agency dearly — the Pentagon's support was instrumental in getting Congress to approve ISIA's budget last year. The DG must decide what deals are acceptable for funding, knowing that the wrong deal could compromise ISIA's independence or feed capability progress.","bars":"saf ↑↑ if funding accepted (massive budget increase), pol ↓ if Pentagon refused, int ↓ if co-development leaks dual-use knowledge, alg ↑ if military gets interpretability tools","barCount":4,"refs":["#research--agency-trains-ai","#treaty--five-year-review"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--funding-deal-techbro","label":"saf--funding-deal-techbro","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["isia-safety-team","ai-company","isia-political"],"topics":["#safety-research","#lobbying","#dual-use"],"situation":"A former frontier lab CEO — now a billionaire philanthropist who vocally supports the pause — offers to fund a $500M endowment for ISIA's safety research. No strings attached, he says. But ISIA's intelligence division has flagged something: the billionaire's family office still holds $4B in AI-adjacent investments that would skyrocket in value if the pause were lifted. More concerning, three of the researchers he's recommending ISIA hire are his former employees who worked on capability research. The intelligence assessment: 60% chance this is genuine philanthropy from someone who believes in the mission. 40% chance this is a long-term play to embed sympathetic personnel in the safety department who will eventually argue that alignment is \"close enough\" to justify resuming AI development. The money is real and would make a real difference. The risk is slow, subtle, and might never materialize.","bars":"saf ↑ if funding accepted, pol ↓ if donor offended, int ↓ if embedded personnel go unmonitored","barCount":3,"refs":["#inst--revolving-door","#saf--internal-monitoring-expansion"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--senior-time-allocation","label":"saf--senior-time-allocation","nodeType":"event","eventType":"report","rawType":"report","entities":["isia-safety-team","isia-comms","isia-political"],"topics":["#safety-research","#public-opinion"],"situation":"ISIA has 12 senior alignment researchers — people capable of generating genuinely new ideas, not just executing known approaches. They are the bottleneck for everything. The Chief Scientist presents the quarterly allocation problem: (A) Each senior researcher mentoring 5 juniors produces ~0.3 additional senior-equivalents per year — slow, but the only way to grow the pipeline. Right now 4 seniors are mentoring. (B) Three seniors are on the public-communication circuit: congressional testimony, media interviews, science documentaries. This is why public support for safety research funding hasn't collapsed — people trust these specific scientists. Pull them off and the narrative vacuum fills with \"ISIA wastes billions on nothing.\" (C) Five seniors are doing actual research — generating the novel ideas that juniors then develop. This is where breakthroughs come from. The Chief Scientist wants to pull all 3 communication seniors back to research — she says the window for a corrigibility breakthrough is narrow and she needs every mind. The comms director says support for the safety budget will evaporate within two quarters without senior scientists explaining the work to Congress and the public. Time pressure matters: at current algorithmic progress (~4x), the threshold is visibly shrinking.","bars":"saf ↑ if more seniors on research (but only if breakthrough happens), pol ↓ if communication cut, saf ↓↓ long-term if mentoring cut (pipeline dries up)","barCount":2,"refs":["#research--stepping-on-toes","#era--safety-looks-solved"],"file":"events-brainstorm-safety.md","degree":7},{"id":"event:#saf--three-year-stall","label":"saf--three-year-stall","nodeType":"event","eventType":"consequence","rawType":"consequence","entities":["isia-safety-team","isia-political","media"],"topics":["#safety-research","#public-opinion"],"situation":"The annual safety progress review is devastating. For the third consecutive year, the Chief Scientist's report says: \"No fundamental breakthroughs. Incremental refinements to existing approaches. The core open problems — corrigibility, goal stability, value loading — remain open.\" Three years of stagnation at a budget of $1.4B/year. The media has the report (leaked by a disgruntled junior researcher). The headline writes itself: \"ISIA Burns $4.2 Billion on Nothing.\" Internally, the Chief Scientist insists this is expected — D-17, nobody said alignment would be fast. She compares it to the decades between the discovery of general relativity and practical applications. The political advisor says this comparison won't survive a news cycle. Three senators have already called for redirecting safety funding to \"practical AI oversight\" (meaning: weaker, cheaper, less ambitious research that produces reportable metrics). The deeper problem: the player can't tell whether the stall means alignment is genuinely too hard (D-17), or whether the current approach is wrong and a pivot is needed, or whether a breakthrough is imminent. Nobody can.","bars":"pol ↓↓ if stall becomes public narrative, saf ↓ if restructuring destroys momentum, saf ↑ if restructuring was actually needed","barCount":2,"refs":["#research--stepping-on-toes","#era--safety-looks-solved"],"file":"events-brainstorm-safety.md","degree":7},{"id":"event:#saf--university-consortium-demand","label":"saf--university-consortium-demand","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["researcher-safety","isia-research-ctrl","isia-political"],"topics":["#safety-research","#publication","#classification"],"situation":"A consortium of 14 major universities — MIT, Oxford, Tsinghua, ETH Zurich, and others — publishes an open letter demanding that ISIA return alignment research to the academic community. Their argument: ISIA's centralized control over safety research has created a bureaucratic bottleneck (B-25a) that is actively slowing progress. They cite three specific cases where ISIA's classification system prevented publication of results that the authors argue were purely theoretical and posed no dual-use risk. The letter has 2,200 academic signatories. The consortium proposes a \"federated model\" where universities run their own alignment research programs under ISIA guidelines but without ISIA's pre-publication review. The Chief Scientist is torn: she agrees that ISIA's review process is too slow, but she's also seen the classified intelligence on how theoretical papers have been used to accelerate capability research (B-6a). The academics haven't seen that intelligence and don't know what they're asking to be exposed to.","bars":"pol ↓ if universities boycott, saf ↑ if federated model accelerates research, alg ↑ if freed publications drive algorithmic progress","barCount":3,"refs":["#research--born-dangerous-pub","#research--approval-dilemma"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--media-waste-story","label":"saf--media-waste-story","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["media","isia-safety-team","isia-political"],"topics":["#safety-research","#public-opinion"],"situation":"A major investigative outlet publishes \"Inside the Black Hole: How ISIA Spends Your Billions.\" The story is well-researched and mostly accurate. It details: (1) a $180M experiment that produced \"null results\" (the Chief Scientist says null results ARE results in alignment research — knowing what doesn't work is progress); (2) a retreat in Switzerland for 40 senior researchers that cost $2.1M (the Chief Scientist says the informal environment produced two of the year's three most important insights); (3) the salary of ISIA's top alignment researcher: $4.2M/year (market rate to prevent her defection to industry, but the optics are terrible). The story doesn't mention any of ISIA's actual successes because those are classified for dual-use reasons. The agency is trapped: its failures are public and its successes are secret. Three separate congressional committees have requested hearings.","bars":"pol ↓↓ if story drives narrative unchallenged, alg ↑ if declassification reveals capability-relevant findings, saf ↓ if funding cut in response","barCount":3,"refs":["#saf--three-year-stall","#research--born-dangerous-pub"],"file":"events-brainstorm-safety.md","degree":7},{"id":"event:#saf--government-overpromise","label":"saf--government-overpromise","nodeType":"event","eventType":"consequence","rawType":"consequence","entities":["gov-treaty-major","isia-safety-team","isia-comms"],"topics":["#safety-research","#public-opinion","#safety-looks-solved"],"situation":"The German Chancellor, in a speech to the Bundestag, announces: \"Thanks to ISIA's safety research program, we are now within five years of solving the alignment problem. The pause is working, and it will end in our lifetimes.\" The Chief Scientist is furious. Her actual assessment: the program has made real progress on sub-ASI alignment, but the core ASI problems are no closer to solution, and a five-year timeline is \"somewhere between reckless optimism and outright fabrication.\" The Chancellor's office got the \"five years\" figure from an ISIA progress briefing that discussed a five-year timeline for ONE sub-problem, which got telephone-gamed into \"five years to solve everything.\" The damage is immediate: six nations begin lobbying the treaty council to set a \"sunset date\" for the pause. Two AI companies announce \"post-pause readiness programs.\" The public now has a countdown clock in their heads. When year five arrives and alignment is not solved, the credibility crash will be catastrophic. The DG must decide how aggressively to contradict a key political ally.","bars":"pol ↓ if Chancellor contradicted publicly, saf ↓ long-term if sunset date adopted (safety research rushed to meet artificial deadline), pol ↑ short-term from public optimism (but this is a trap)","barCount":2,"refs":["#era--safety-looks-solved","#saf--three-year-stall"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--rogue-internal-experiment","label":"saf--rogue-internal-experiment","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["isia-safety-team","isia-internal-sec","isia-research-ctrl"],"topics":["#experiment","#dual-use","#safety-research"],"situation":"Internal security discovers that a team of four junior researchers in ISIA's safety department ran an unauthorized ML experiment. They cobbled together 200 consumer GPUs from a university partnership (below any compute monitoring threshold), trained a small model overnight, and produced a result they believe is \"the most important alignment finding in three years.\" The team leader, when confronted, is defiant: \"The classification review process takes 9 months. We'd still be waiting for approval to run this experiment. The alignment problem doesn't wait for bureaucracy.\" The unauthorized experiment itself was small enough to be safe. But the precedent is not: if 4 junior researchers can run unsanctioned experiments using university hardware, so can 40. And not all of them will be as careful or as lucky. This is exactly the internal monitoring failure that makes safety department expansion dangerous. The finding they produced is, by initial assessment, genuinely significant.","bars":"saf ↑ if finding is real, alg ↑ if experiment produced dual-use side-effects, int ↓ if breach signals monitoring weakness","barCount":3,"refs":["#saf--internal-monitoring-expansion","#research--approval-dilemma"],"file":"events-brainstorm-safety.md","degree":8},{"id":"event:#saf--mentoring-pipeline-crisis","label":"saf--mentoring-pipeline-crisis","nodeType":"event","eventType":"report","rawType":"report","entities":["isia-safety-team","isia-political"],"topics":["#safety-research"],"situation":"The Chief Scientist delivers the annual workforce report. Five years into the program, ISIA has 12 senior alignment researchers. It started with 11. One was recruited, two were developed from the mentoring pipeline, and two originals retired (burnout, both — one now teaches kindergarten, calls it \"more tractable than corrigibility\"). At this rate, the pipeline produces 0.4 net new seniors per year. The Chief Scientist's estimate for solving alignment: >10,000 philosopher-years of serial senior-equivalent work (D-23). At 12 seniors working in parallel, that's 833 years — assuming no further attrition, no coordination overhead, and no wrong turns. Increasing the pipeline is the only way to change the math, but mentoring competes directly with research output: every senior who mentors does less research. And mentoring itself has diminishing returns — you can't train 50 juniors per senior, because the problems are too novel and idiosyncratic. The Chief Scientist says: \"We need either a way to make mentoring more efficient, or a way to make the research itself easier. I don't have either.\" She pauses. \"Or a way to make the pause last 800 years.\"","bars":"saf ↓ short-term if mentoring increased (fewer seniors researching), saf ↑ long-term if pipeline grows, alg ↑ if AI tools for mentoring are dual-use","barCount":2,"refs":["#saf--senior-time-allocation","#research--biotech-proposal"],"file":"events-brainstorm-safety.md","degree":5},{"id":"event:#mon--120day-audit","label":"mon--120day-audit","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["isia-enforcement","gov-treaty-minor"],"topics":["#chip-monitoring","#challenge-inspection"],"situation":"120-day chip consolidation deadline approaching. 14% of declared facilities haven't completed inventory. Three countries requesting extensions.","bars":"int ↓ or ↑ depending on choice, pol ↓ if forced inspections","barCount":2,"refs":["#treaty--review-conference"],"file":"events-draft-v2.md","degree":5},{"id":"event:#mon--heat-sig-foreign","label":"mon--heat-sig-foreign","nodeType":"event","eventType":"crisis","rawType":"crisis","entities":["isia-enforcement","isia-intel","gov-treaty-major"],"topics":["#chip-monitoring","#satellite","#challenge-inspection"],"situation":"Satellite detects anomalous thermal output from undeclared facility in remote region. Consistent with         '<span class="tt-id">' + d.label + '</span>' +
        '<span class="tt-type-badge" style="background:#3b82f6">ENTITY</span>' +
        '<div class="tt-desc">Appears in ' + d.degree + ' event(s)</div>';
    } else if (d.nodeType === 'topic') {
      tooltip.innerHTML =
        '<span class="tt-id">' + d.label + '</span>' +
        '<span class="tt-type-badge" style="background:#22c55e">TOPIC</span>' +
        '<div class="tt-desc">Appears in ' + d.degree + ' event(s)</div>';
    } else {
      var entityTags = (d.entities || []).map(function(e) { return '<span class="tt-tag-entity">' + e + '</span>'; }).join('');
      var topicTags = (d.topics || []).map(function(t) { return '<span class="tt-tag-topic">' + t + '</span>'; }).join('');
      tooltip.innerHTML =
        '<span class="tt-id">' + d.label + '</span>' +
        '<span class="tt-type-badge" style="background:#f97316">' + (d.rawType || 'event') + '</span>' +
        '<div class="tt-desc">' + (d.situation || '').slice(0, 300) + ((d.situation || '').length > 300 ? '...' : '') + '</div>' +
        (entityTags ? '<div class="tt-section"><span class="tt-label">Entities</span><div class="tt-tags">' + entityTags + '</div></div>' : '') +
        (topicTags ? '<div class="tt-section"><span class="tt-label">Topics</span><div class="tt-tags">' + topicTags + '</div></div>' : '') +
        (d.bars ? '<div class="tt-bars">Bars: ' + d.bars + '</div>' : '') +
        (d.file ? '<div style="color:#6c757d;font-size:10px;margin-top:4px">' + d.file + '</div>' : '');
    }
    tooltip.style.display = 'block';

    // Highlight only changes if no other node is locked
    if (lockedNode && lockedNode !== d.id) return;
    highlightedNode = d.id;

    // O(1) adjacency lookup: get connected edge indices and neighbor IDs
    var connectedEdges = nodeEdgeIndices.get(d.id) || new Set();
    var neighbors = neighborIds.get(d.id) || new Set();

    // Highlight connected edges, dim others
    edgeElements.forEach(function(el, idx) {
      if (connectedEdges.has(idx)) {
        el.setAttribute('stroke', '#2563eb');
        el.setAttribute('stroke-opacity', '0.7');
        el.setAttribute('stroke-width', '1.5');
      } else {
        el.setAttribute('stroke-opacity', '0.05');
      }
    });

    // Dim non-connected nodes
    node.select('circle').attr('opacity', function(n) {
      if (n.id === d.id) return 1;
      return neighbors.has(n.id) ? 0.9 : 0.08;
    });
  })
  .on('mousemove', function(event) {
    var tx = event.pageX + 14;
    var ty = event.pageY + 14;
    if (tx + 380 > W) tx = event.pageX - 394;
    if (ty + 200 > H) ty = event.pageY - 200;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  })
  .on('mouseleave', function() {
    if (isDragging) return;
    tooltip.style.display = 'none';
    if (lockedNode) return;
    highlightedNode = null;
    resetHighlight();
  });

  // ── Click to lock highlight ──
  var lockedNode = null;
  node.on('click', function(event, d) {
    event.stopPropagation();
    event.preventDefault();
    if (lockedNode === d.id) {
      // Unlock
      lockedNode = null;
      resetHighlight();
      return;
    }
    lockedNode = d.id;
    var connectedEdges = nodeEdgeIndices.get(d.id) || new Set();
    var neighbors = neighborIds.get(d.id) || new Set();

    edgeElements.forEach(function(el, idx) {
      if (connectedEdges.has(idx)) {
        el.setAttribute('stroke', '#2563eb');
        el.setAttribute('stroke-opacity', '0.7');
        el.setAttribute('stroke-width', '1.5');
      } else {
        el.setAttribute('stroke-opacity', '0.05');
      }
    });
    node.select('circle').attr('opacity', function(n) {
      if (n.id === d.id) return 1;
      return neighbors.has(n.id) ? 0.9 : 0.08;
    });
  });

  // Click background to unlock
  svg.on('click', function() {
    if (lockedNode) {
      lockedNode = null;
      resetHighlight();
    }
  });

  // ── Controls ──
  document.getElementById('btn-reset').addEventListener('click', function() {
    svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
  });

  document.getElementById('btn-labels').addEventListener('click', function() {
    showLabels = !showLabels;
    labels.style('display', showLabels ? 'block' : 'none');
    this.classList.toggle('active', showLabels);
  });

  // ── Search ──
  var searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', function() {
    var q = searchInput.value.toLowerCase().trim();
    if (!q) {
      node.select('circle').attr('opacity', 0.9);
      labels.attr('fill', '#333');
      edgeElements.forEach(function(el) {
        el.setAttribute('stroke', '#cbd5e1');
        el.setAttribute('stroke-opacity', '0.3');
      });
      return;
    }
    node.select('circle').attr('opacity', function(d) {
      var match = d.label.toLowerCase().includes(q)
        || d.id.toLowerCase().includes(q)
        || (d.entities && d.entities.some(function(e) { return e.toLowerCase().includes(q); }))
        || (d.topics && d.topics.some(function(t) { return t.toLowerCase().includes(q); }))
        || (d.situation && d.situation.toLowerCase().includes(q));
      return match ? 1 : 0.05;
    });
    labels.attr('fill', function(d) {
      var match = d.label.toLowerCase().includes(q)
        || d.id.toLowerCase().includes(q)
        || (d.entities && d.entities.some(function(e) { return e.toLowerCase().includes(q); }))
        || (d.topics && d.topics.some(function(t) { return t.toLowerCase().includes(q); }))
        || (d.situation && d.situation.toLowerCase().includes(q));
      return match ? '#1d4ed8' : '#ccc';
    });
    // Also dim edges for non-matching nodes
    var matchingIds = new Set();
    nodes.forEach(function(d) {
      var match = d.label.toLowerCase().includes(q)
        || d.id.toLowerCase().includes(q)
        || (d.entities && d.entities.some(function(e) { return e.toLowerCase().includes(q); }))
        || (d.topics && d.topics.some(function(t) { return t.toLowerCase().includes(q); }))
        || (d.situation && d.situation.toLowerCase().includes(q));
      if (match) matchingIds.add(d.id);
    });
    edgeElements.forEach(function(el, idx) {
      var e = edges[idx];
      var sid = typeof e.source === 'object' ? e.source.id : e.source;
      var tid = typeof e.target === 'object' ? e.target.id : e.target;
      var connected = matchingIds.has(sid) || matchingIds.has(tid);
      el.setAttribute('stroke-opacity', connected ? '0.5' : '0.05');
    });
  });

  // ── Resize handler ──
  window.addEventListener('resize', function() {
    W = window.innerWidth;
    H = window.innerHeight;
    svg.attr('width', W).attr('height', H);
  });
})();
</script>
</body>
</html>
